<div class="container">
  <div class="page-header">
    <h1>Edit User</h1>
    <a routerLink="/users" class="btn btn-secondary">Back to Users</a>
  </div>

  <div *ngIf="errorMessage" class="alert alert-error">
    {{ errorMessage }}
  </div>

  <div *ngIf="loading" class="loading-container">
    <span class="spinner"></span>
    <p>Loading user...</p>
  </div>

  <div *ngIf="!loading" class="card form-card">
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input id="firstName" type="text" formControlName="firstName" />
          <div class="error-message" *ngIf="userForm.get('firstName')?.touched && userForm.get('firstName')?.hasError('required')">
            First name is required
          </div>
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input id="lastName" type="text" formControlName="lastName" />
          <div class="error-message" *ngIf="userForm.get('lastName')?.touched && userForm.get('lastName')?.hasError('required')">
            Last name is required
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email (read-only)</label>
        <input id="email" type="email" formControlName="email" />
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input id="phone" type="tel" formControlName="phone" />
      </div>

      <div class="form-group">
        <label for="dateOfBirth">Date of Birth</label>
        <input id="dateOfBirth" type="date" formControlName="dateOfBirth" />
      </div>

      <div class="form-group">
        <label for="password">New Password (leave blank to keep current)</label>
        <input id="password" type="password" formControlName="password" placeholder="Min. 8 characters" />
        <div class="error-message" *ngIf="userForm.get('password')?.touched && userForm.get('password')?.hasError('minlength')">
          Password must be at least 8 characters
        </div>
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" formControlName="role">
          <option *ngFor="let role of availableRoles" [value]="role">{{ role }}</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="userForm.invalid || saving">
          <span *ngIf="saving" class="spinner"></span>
          <span *ngIf="!saving">Save Changes</span>
        </button>
        <a routerLink="/users" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
