<div class="auth-page">
  <header class="auth-topbar">
    <a class="auth-brand" routerLink="/auth/login">
      <img src="assets/logo.png" alt="Serenity" class="auth-brand-logo" />
      <span>Serenity</span>
    </a>
  </header>

  <div class="auth-container">
    <div class="card otp-card">
      <h1>Verify OTP</h1>
      <p class="subtitle">Enter the 6-digit code sent to your email.</p>
      <p class="email-hint">{{ email }}</p>

      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <form [formGroup]="otpForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="otp">OTP Code</label>
          <input
            id="otp"
            type="text"
            inputmode="numeric"
            maxlength="6"
            formControlName="otp"
            placeholder="123456"
          />
          <div class="error-message" *ngIf="otpForm.get('otp')?.touched && otpForm.get('otp')?.hasError('required')">
            OTP is required
          </div>
          <div class="error-message" *ngIf="otpForm.get('otp')?.touched && otpForm.get('otp')?.hasError('pattern')">
            OTP must be exactly 6 digits
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
          <span *ngIf="loading" class="spinner"></span>
          <span *ngIf="!loading">Verify OTP</span>
        </button>
      </form>

      <button type="button" class="btn btn-outline btn-block back-btn" (click)="backToEmailStep()">
        Back
      </button>
    </div>
  </div>
</div>
