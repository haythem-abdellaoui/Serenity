<div class="auth-page">
  <header class="auth-topbar">
    <a class="auth-brand" routerLink="/auth/login">
      <img src="assets/logo.png" alt="Serenity" class="auth-brand-logo" />
      <span>Serenity</span>
    </a>
  </header>

  <div class="auth-container">
    <div class="card reset-card">
      <h1>Set New Password</h1>
      <p class="subtitle">Choose a strong password to secure your account.</p>

      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input id="newPassword" type="password" formControlName="newPassword" placeholder="Enter new password" />
          <div class="error-message" *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.hasError('required')">
            Password is required
          </div>
          <div class="error-message" *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.hasError('minlength')">
            Password must be at least 8 characters
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="Confirm new password" />
          <div class="error-message" *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.get('confirmPassword')?.hasError('required')">
            Please confirm your password
          </div>
          <div class="error-message" *ngIf="resetForm.touched && resetForm.hasError('passwordMismatch')">
            Passwords do not match
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
          <span *ngIf="loading" class="spinner"></span>
          <span *ngIf="!loading">Reset Password</span>
        </button>
      </form>
    </div>
  </div>
</div>
