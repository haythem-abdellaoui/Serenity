<div class="auth-page">
  <header class="auth-topbar">
    <a class="auth-brand" routerLink="/auth/login">
      <img src="assets/logo.png" alt="Serenity" class="auth-brand-logo" />
      <span>Serenity</span>
    </a>
  </header>

  <div class="auth-container">
    <div class="card forgot-card">
      <h1>Forgot Password</h1>
      <p class="subtitle">Enter your email address to receive an OTP code.</p>

      <div *ngIf="infoMessage" class="alert alert-info">
        {{ infoMessage }}
      </div>

      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" formControlName="email" placeholder="you@example.com" />
          <div class="error-message" *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.hasError('required')">
            Email is required
          </div>
          <div class="error-message" *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.hasError('email')">
            Please enter a valid email
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
          <span *ngIf="loading" class="spinner"></span>
          <span *ngIf="!loading">Send OTP</span>
        </button>
      </form>

      <p class="switch-link">
        Remembered your password?
        <a routerLink="/auth/login">Back to login</a>
      </p>
    </div>
  </div>
</div>
