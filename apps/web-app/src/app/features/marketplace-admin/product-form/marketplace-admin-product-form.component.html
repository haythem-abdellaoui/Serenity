<section class="container admin-product-form-page">
  <h2>{{ productId ? 'Edit Product' : 'Create Product' }}</h2>

  <p class="error" *ngIf="error">{{ error }}</p>
  <p *ngIf="loading">Loading product...</p>

  <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!loading">
    <label>Name</label>
    <input type="text" formControlName="name" />

    <label>Description</label>
    <textarea rows="4" formControlName="description"></textarea>

    <div class="grid-two">
      <div>
        <label>Category</label>
        <select formControlName="category">
          <option *ngFor="let c of categories" [value]="c.value">{{ c.label }}</option>
        </select>
      </div>
      <div>
        <label>Type</label>
        <select formControlName="type" (change)="onTypeChanged()">
          <option *ngFor="let t of types" [value]="t.value">{{ t.label }}</option>
        </select>
      </div>
    </div>

    <div class="grid-two">
      <div>
        <label>Price</label>
        <input type="number" step="0.01" min="0.10" formControlName="price" />
      </div>
      <div>
        <label>Status</label>
        <select formControlName="active">
          <option [ngValue]="true">Active</option>
          <option [ngValue]="false">Inactive</option>
        </select>
      </div>
    </div>

    <label>Image URL</label>
    <input type="text" formControlName="imageUrl" />

    <section class="preview-fields" *ngIf="isDigitalSelected">
      <h3>Digital Content Settings</h3>

      <label class="checkbox-row">
        <input type="checkbox" formControlName="previewable" />
        This digital item has a preview mode
      </label>

      <div class="grid-two" *ngIf="form.controls.previewable.value">
        <div>
          <label>Preview Type</label>
          <select formControlName="previewType">
            <option value="">Select preview type</option>
            <option *ngFor="let previewType of previewTypes" [value]="previewType">{{ previewType }}</option>
          </select>
        </div>
        <div>
          <label>Preview URL</label>
          <input type="text" formControlName="previewUrl" placeholder="https://..." />
        </div>
      </div>

      <label>Full Content URL (optional)</label>
      <input type="text" formControlName="contentUrl" placeholder="https://..." />
    </section>

    <div class="actions">
      <button class="btn btn-secondary" type="button" (click)="cancel()">Cancel</button>
      <button class="btn btn-primary" type="submit" [disabled]="saving">
        {{ saving ? 'Saving...' : 'Save Product' }}
      </button>
    </div>
  </form>
</section>
