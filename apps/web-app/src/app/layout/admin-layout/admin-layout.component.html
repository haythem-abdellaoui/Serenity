<div class="admin-shell" [class.collapsed]="sidebarCollapsed">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <img src="assets/logo.png" alt="Serenity" class="brand-icon" />
        <span class="brand-text">Serenity</span>
      </div>
      <span class="brand-badge">Admin</span>
    </div>

    <nav class="sidebar-nav">
      <a *ngFor="let item of visibleNavItems"
         [routerLink]="item.route"
         class="nav-item"
         [class.active]="isActive(item.route)">
        <svg class="nav-icon" [attr.data-icon]="item.icon">
          <use [attr.href]="'#icon-' + item.icon"></use>
        </svg>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="nav-item logout" (click)="logout()">
        <svg class="nav-icon" data-icon="logout">
          <use href="#icon-logout"></use>
        </svg>
        <span class="nav-label">Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- Main content area -->
  <div class="main-wrapper">
    <header class="topbar">
      <button class="toggle-btn" (click)="toggleSidebar()">
        <span class="toggle-line"></span>
        <span class="toggle-line"></span>
        <span class="toggle-line"></span>
      </button>

      <div class="topbar-right">
        <div class="admin-profile">
          <div class="admin-avatar">{{ getInitials() }}</div>
          <div class="admin-info">
            <span class="admin-name">{{ getDisplayName() }}</span>
            <span class="admin-role">Administrator</span>
          </div>
        </div>
      </div>
    </header>

    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>

    <footer class="admin-footer">
      <span>&copy; {{ currentYear }} Serenity</span>
      <span class="footer-dot">&middot;</span>
      <span>Admin Panel</span>
    </footer>
  </div>
</div>
