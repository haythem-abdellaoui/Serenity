<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Process Claim</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
    }
    .topbar {
      background: #111827;
      color: #fff;
      padding: 0.9rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar a {
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .container {
      max-width: 860px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .ref {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.8rem;
      color: #6b7280;
    }
    .badge {
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .PENDING { background: #dbeafe; color: #1d4ed8; }
    .SUBMITTED { background: #e0e7ff; color: #3730a3; }
    .UNDER_REVIEW { background: #cffafe; color: #155e75; }
    .NEEDS_INFO { background: #fef3c7; color: #92400e; }
    .APPROVED { background: #d1fae5; color: #065f46; }
    .PARTIALLY_APPROVED { background: #dbeafe; color: #1e40af; }
    .PAID { background: #dcfce7; color: #166534; }
    .REJECTED { background: #fee2e2; color: #991b1b; }
    .grid {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 0.55rem 1rem;
      margin-top: 0.9rem;
    }
    .label { color: #6b7280; font-weight: 600; font-size: 0.85rem; }
    .value { font-weight: 600; color: #111827; font-size: 0.92rem; }
    .attachments { margin-top: 1rem; }
    .attachments a {
      display: inline-block;
      margin-right: 0.7rem;
      margin-bottom: 0.35rem;
      color: #2563eb;
      text-decoration: none;
      font-size: 0.84rem;
    }
    .attachments a:hover { text-decoration: underline; }
    .actions {
      margin-top: 1.2rem;
      border-top: 1px solid #e5e7eb;
      padding-top: 1rem;
      display: grid;
      gap: 0.75rem;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 0.55rem 0.65rem;
      font-size: 0.9rem;
      font-family: inherit;
    }
    textarea {
      min-height: 86px;
      resize: vertical;
    }
    .btn-row {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 0.55rem 0.9rem;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
    }
    .approve { background: #10b981; }
    .reject { background: #ef4444; }
    .muted { background: #6b7280; }
    .msg {
      margin-top: 0.65rem;
      font-size: 0.85rem;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <strong>Insurance Claim Processing</strong>
    <a href="/">Back to list</a>
  </div>

  <div class="container">
    <div class="card" id="claimCard">Loading claim...</div>
  </div>

  <script>
    const API = '';
    const params = new URLSearchParams(globalThis.location.search);
    const ref = params.get('ref');

    const card = document.getElementById('claimCard');

    if (ref) {
      loadClaim();
    } else {
      card.textContent = 'Missing claim reference.';
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    async function loadClaim() {
      try {
        const res = await fetch(`${API}/api/claims/${encodeURIComponent(ref)}`);
        if (!res.ok) {
          card.textContent = 'Claim not found.';
          return;
        }
        const claim = await res.json();
        render(claim);
      } catch (_e) {
        card.textContent = 'Failed to load claim.';
      }
    }

    function render(claim) {
      const attachmentsHtml = Array.isArray(claim.attachmentUrls) && claim.attachmentUrls.length > 0
        ? claim.attachmentUrls.map((url, idx) =>
            `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">Attachment ${idx + 1}</a>`).join('')
        : '<span class="value">No attachments</span>';

      card.innerHTML = `
        <div class="header">
          <div>
            <h2>${esc(claim.description)}</h2>
            <div class="ref">${esc(claim.ref)}</div>
          </div>
          <span class="badge ${claim.status}">${claim.status}</span>
        </div>

        <div class="grid">
          <div class="label">Patient</div><div class="value">${esc(claim.patientName)}</div>
          <div class="label">Insurance</div><div class="value">${esc(claim.insuranceCompany)} - Grade ${esc(String(claim.insuranceGrade))}</div>
          <div class="label">Amount</div><div class="value">${Number(claim.amount).toFixed(2)} TND</div>
          <div class="label">Suggested reimbursement</div><div class="value">${Number(claim.reimbursementAmount ?? claim.amount).toFixed(2)} TND</div>
          <div class="label">Received</div><div class="value">${new Date(claim.receivedAt).toLocaleString()}</div>
        </div>

        <div class="attachments">
          <div class="label" style="margin-bottom:0.35rem;">Attachments</div>
          ${attachmentsHtml}
        </div>

        ${['PENDING', 'SUBMITTED', 'UNDER_REVIEW', 'NEEDS_INFO'].includes(claim.status) ? `
          <div class="actions">
            <div>
              <div class="label" style="margin-bottom:0.25rem;">Approved reimbursement amount (TND)</div>
              <input type="number" id="approveAmount" value="${Number(claim.reimbursementAmount ?? claim.amount).toFixed(2)}" step="0.01" min="0.01" max="${claim.amount}">
            </div>
            <div>
              <div class="label" style="margin-bottom:0.25rem;">Reason</div>
              <textarea id="decisionReason" placeholder="Required for rejection. Required if reimbursement amount is changed."></textarea>
            </div>
            <div>
              <div class="label" style="margin-bottom:0.25rem;">Deadline (for NEEDS_INFO)</div>
              <input type="datetime-local" id="deadlineInput">
            </div>
            <div class="btn-row">
              <button class="approve" onclick="approve(${Number(claim.amount)}, ${Number(claim.reimbursementAmount ?? claim.amount)})">Approve</button>
              <button class="muted" onclick="needInfo()">Request Docs</button>
              ${claim.status === 'NEEDS_INFO'
                ? '<button class="muted" onclick="markUnderReview()">Mark Under Review</button>'
                : ''
              }
              <button class="reject" onclick="reject()">Reject</button>
              <button class="muted" onclick="location.href='/'">Cancel</button>
            </div>
            <div class="msg" id="msg"></div>
          </div>
        ` : `
          <div class="actions">
            <div class="msg">
              ${claim.status === 'APPROVED'
                ? `Processed as approved. Paid: ${Number(claim.reimbursementAmount || 0).toFixed(2)} TND${claim.adjustmentReason ? ` - ${esc(claim.adjustmentReason)}` : ''}`
                : `Processed as rejected${claim.rejectReason ? ` - ${esc(claim.rejectReason)}` : ''}`
              }
            </div>
          </div>
        `}
      `;
    }

    async function approve(originalAmount, suggestedAmount) {
      const amountInput = document.getElementById('approveAmount');
      const reasonInput = document.getElementById('decisionReason');
      const msg = document.getElementById('msg');
      const amount = Number(amountInput.value);
      const reason = reasonInput.value.trim();

      if (!Number.isFinite(amount) || amount <= 0) {
        msg.textContent = 'Please enter a valid reimbursement amount.';
        return;
      }
      if (amount > originalAmount) {
        msg.textContent = 'Reimbursement amount cannot exceed paid amount.';
        return;
      }
      const changed = Math.abs(amount - suggestedAmount) > 0.0001;
      if (changed && !reason) {
        msg.textContent = 'Please provide a reason when changing reimbursement amount.';
        return;
      }

      const res = await fetch(`${API}/api/claims/${encodeURIComponent(ref)}/approve`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reimbursementAmount: amount, adjustmentReason: reason || null })
      });
      if (!res.ok) {
        msg.textContent = 'Failed to approve claim.';
        return;
      }
      location.href = '/';
    }

    async function reject() {
      const reasonInput = document.getElementById('decisionReason');
      const msg = document.getElementById('msg');
      const rejectReason = reasonInput.value.trim();
      if (!rejectReason) {
        msg.textContent = 'Rejection reason is required.';
        return;
      }

      const res = await fetch(`${API}/api/claims/${encodeURIComponent(ref)}/reject`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rejectReason })
      });
      if (!res.ok) {
        msg.textContent = 'Failed to reject claim.';
        return;
      }
      location.href = '/';
    }

    async function needInfo() {
      const reasonInput = document.getElementById('decisionReason');
      const deadlineInput = document.getElementById('deadlineInput');
      const msg = document.getElementById('msg');
      const infoRequestReason = reasonInput.value.trim();
      const infoRequestDeadline = deadlineInput.value;
      if (!infoRequestReason) {
        msg.textContent = 'Reason is required to request additional documents.';
        return;
      }
      if (!infoRequestDeadline) {
        msg.textContent = 'Deadline is required to request additional documents.';
        return;
      }

      const res = await fetch(`${API}/api/claims/${encodeURIComponent(ref)}/need-info`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          infoRequestReason,
          infoRequestDeadline: new Date(infoRequestDeadline).toISOString()
        })
      });
      if (!res.ok) {
        msg.textContent = 'Failed to set claim to NEEDS_INFO.';
        return;
      }
      location.href = '/';
    }

    async function markUnderReview() {
      const msg = document.getElementById('msg');
      const res = await fetch(`${API}/api/claims/${encodeURIComponent(ref)}/mark-under-review`, {
        method: 'PATCH'
      });
      if (!res.ok) {
        msg.textContent = 'Failed to set claim to UNDER_REVIEW.';
        return;
      }
      location.href = '/';
    }
  </script>
</body>
</html>
