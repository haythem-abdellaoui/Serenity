spring.application.name=derbelmicroservice
server.port=8099

# ── Load .env file ──
# Works whether you run from the service folder or repo root.
spring.config.import=optional:file:./.env[.properties],optional:file:./services/derbelmicroservice/.env[.properties]

# MySQL Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# CORS (Angular dev : ng serve sur le port 4200)
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200
app.cors.allow-credentials=true

# JWT validation (same secret as user-service)
app.jwt.secret=${JWT_SECRET}

# Used to resolve connected user id when JWT has no userId claim.
app.user-service.base-url=${USER_SERVICE_BASE_URL}

# Cloudinary (Image Upload)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
