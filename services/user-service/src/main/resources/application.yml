server:
  port: ${SERVER_PORT}

spring:
  config:
    # Works whether you run from the service folder or repo root.
    import: optional:file:./.env[.properties],optional:file:./services/user-service/.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  # Shared with appointment-service for reminder emails (X-Internal-Key on POST /api/internal/users/emails-by-ids)
  internal-api-key: ${INTERNAL_API_KEY:}
  upload:
    dir: ${UPLOAD_DIR}
  public-base-url: ${USER_PUBLIC_BASE_URL}
  insurance:
    api-url: ${INSURANCE_API_URL}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION}
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
    facebook:
      app-id: ${FACEBOOK_APP_ID}
      app-secret: ${FACEBOOK_APP_SECRET}
  password-reset:
    otp-length: ${PASSWORD_RESET_OTP_LENGTH}
    otp-ttl-seconds: ${PASSWORD_RESET_OTP_TTL_SECONDS}
    otp-max-attempts: ${PASSWORD_RESET_OTP_MAX_ATTEMPTS}
    reset-token-ttl-seconds: ${PASSWORD_RESET_TOKEN_TTL_SECONDS}
  ban:
    # Every 30 minutes on the clock (:00, :30)
    cleanup-cron: ${BAN_CLEANUP_CRON}
    cleanup-zone: ${BAN_CLEANUP_ZONE}
  mail:
    from: ${MAIL_FROM:}

